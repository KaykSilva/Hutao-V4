name: Deploy VPS

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy with PM2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and check syntax
        run: |
          npm ci
          node --check src/index.js

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "bash -s -- '$APP_DIR' '$GITHUB_REF_NAME'" << 'EOF'
            set -e

            APP_DIR="$1"
            DEPLOY_BRANCH="$2"

            cd "$APP_DIR"
            git fetch --all --prune
            git reset --hard "origin/${DEPLOY_BRANCH:-main}"
            npm ci --omit=dev

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            pm2 startOrReload ecosystem.config.js --env production
            pm2 save
          EOF
