name: Deploy VPS

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy with PM2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and check syntax
        run: |
          npm ci
          node --check src/index.js

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          set -e

          if [ -z "$VPS_SSH_KEY" ]; then
            echo "Secret VPS_SSH_KEY nao foi configurado."
            exit 1
          fi

          if [ -z "$VPS_HOST" ]; then
            echo "Secret VPS_HOST nao foi configurado."
            exit 1
          fi

          if [ -z "$VPS_USER" ]; then
            echo "Secret VPS_USER nao foi configurado."
            exit 1
          fi

          if [ -z "$APP_DIR" ]; then
            echo "Secret APP_DIR nao foi configurado."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts || true

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
          REPOSITORY: ${{ github.repository }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 \
            -p "${VPS_PORT:-22}" \
            "$VPS_USER@$VPS_HOST" \
            "bash -s -- '$APP_DIR' '$GITHUB_REF_NAME' '$REPOSITORY'" << 'EOF'
            set -e

            APP_DIR="$1"
            DEPLOY_BRANCH="$2"
            REPOSITORY="$3"

            if [ ! -d "$APP_DIR/.git" ]; then
              if [ -d "$APP_DIR" ] && [ "$(find "$APP_DIR" -mindepth 1 -maxdepth 1 | wc -l)" -gt 0 ]; then
                echo "APP_DIR existe, mas nao e um repositorio Git e nao esta vazio: $APP_DIR"
                echo "Esvazie a pasta, clone o projeto nela, ou ajuste o secret APP_DIR."
                exit 1
              fi

              mkdir -p "$APP_DIR"
              git clone --branch "${DEPLOY_BRANCH:-production}" "https://github.com/$REPOSITORY.git" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git reset --hard "origin/${DEPLOY_BRANCH:-production}"
            npm ci --omit=dev

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            pm2 startOrReload ecosystem.config.js --env production
            pm2 save
          EOF
